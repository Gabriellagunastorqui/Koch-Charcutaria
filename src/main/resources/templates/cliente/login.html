<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Login - Koch Charcutaria</title>
</head>
<body>
<header class="topbar">
    <img th:src="@{/css/logo.png}" alt="Logo Koch">
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="menu-button" aria-label="Abrir menu">
        <i class="fa-solid fa-bars"></i>
    </label>
    <div class="links">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/suinos}">Suinos</a>
        <a th:href="@{/carnes}">Carnes</a>
        <a th:href="@{/historia}">Historia</a>
        <a th:href="@{/sobre}">Sobre</a>
        <a th:href="@{/delivery}">Delivery</a>
        <a th:href="@{/login}" class="mobile-action"><i class="fa-solid fa-user"></i>Usuario</a>
        <a th:href="@{/carrinho}" class="mobile-action"><i class="fa-solid fa-cart-shopping"></i>Carrinho</a>
        <a th:href="@{/contato}" class="mobile-action"><i class="fa-solid fa-phone"></i>Contato</a>
    </div>
    <div class="icons">
        <i class="fa-solid fa-user"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <button type="button">
            <i class="fa-solid fa-phone"></i>
            Contato
        </button>
    </div>
    <label for="menu-toggle" class="menu-overlay" aria-hidden="true"></label>
</header>

<main>
    <div class="login">
        <img th:src="@{/css/logo.png}" alt="Logo Koch">
        <div class="subLogin">
            <h2>Faça Login</h2>
            <form th:action="@{/login}" method="post">
                <div class="inputs">
                    <div class="solo">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Informe seu E-mail">
                    </div>
                    <div class="solo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Informe sua Senha">
                    </div>
                    <div class="double">
                        <button type="submit">Fazer Login</button>
                        <p th:onclick="|window.location.href='@{/cadastro}'|">Cadastre-se</p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="site-footer">
    <div class="site-footer__inner">
        <div class="site-footer__brand" aria-label="KOCH Embutidos e suínos">
            <div class="site-footer__deco site-footer__deco--left">
                <span class="site-footer__line" aria-hidden="true"></span>
                <span class="site-footer__bar" aria-hidden="true">|</span>
            </div>
            <div class="site-footer__titles">
                <p class="site-footer__name">KOCH</p>
                <p class="site-footer__tagline">Embutidos e suínos</p>
            </div>
            <div class="site-footer__deco site-footer__deco--right">
                <span class="site-footer__bar" aria-hidden="true">|</span>
                <span class="site-footer__line" aria-hidden="true"></span>
            </div>
        </div>
        <p class="site-footer__copy">© 2025 Grupo 2. Todos os direitos reservados.</p>
    </div>
</footer>
</body>
</html>
